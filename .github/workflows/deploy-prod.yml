name: Deploy to Production

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

env:
  ACR_NAME: hinikubestageacr.azurecr.io
  IMAGE_NAME: ciyex-ehr-ui-prod
  CLUSTER_NAME: hiniKubeProd
  RESOURCE_GROUP: hiniKubeProd-rg
  VERSION: v1.0.${{ github.run_number }}

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.ciyex.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Azure ACR Login
        run: az acr login --name hinikubestageacr

      - name: Extract release version
        id: version
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          VERSION=${BRANCH_NAME#release/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .
          docker push ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          echo "✅ Image pushed: ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Update manifest image tags for deployment
        run: |
          sed -i "s|IMAGE_URL:IMAGE_TAG|${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}|g" k8s/overlays/prod/kustomization.yaml

      - name: Deploy to Production
        run: kubectl apply -k k8s/overlays/prod/

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/ciyex-ehr-ui-prod --timeout=5m
          kubectl get pods -l app=ciyex-ehr-ui -o wide

      - name: Notify deployment
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Production deployment successful (Release: ${{ steps.version.outputs.version }})"
          else
            echo "❌ Production deployment failed"
          fi

      - name: Create deployment tag
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "prod-${{ steps.version.outputs.version }}-$(date +%Y%m%d-%H%M%S)" -m "Production deployment: ${{ steps.version.outputs.version }}"
          git push origin --tags

  notify:
    name: Notify Team
    if: always()
    runs-on: ubuntu-latest
    needs: [deploy-prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract release version
        id: version
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          VERSION=${BRANCH_NAME#release/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.deploy-prod.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Microsoft Teams notification
        run: |
          TEAMS_WEBHOOK="${{ secrets.TEAMS_WEBHOOK_URL }}"
          if [ -z "$TEAMS_WEBHOOK" ]; then
            echo "⚠️ TEAMS_WEBHOOK_URL secret not configured, skipping notification"
            exit 0
          fi
          
          STATUS_COLOR="28a745"
          if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
            STATUS_COLOR="dc3545"
          fi
          
          # Detect if this is a Power Automate webhook or traditional Teams webhook
          if [[ "$TEAMS_WEBHOOK" == *"powerautomate"* ]] || [[ "$TEAMS_WEBHOOK" == *"logic.azure.com"* ]]; then
            # Power Automate / Logic Apps format with attachments array
            CARD_STYLE="good"
            if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
              CARD_STYLE="attention"
            fi
            
            curl -X POST -H "Content-Type: application/json" -d '{
              "attachments": [
                {
                  "contentType": "application/vnd.microsoft.card.adaptive",
                  "content": {
                    "type": "AdaptiveCard",
                    "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                    "version": "1.4",
                    "body": [
                      {
                        "type": "Container",
                        "style": "'"$CARD_STYLE"'",
                        "items": [
                          {
                            "type": "TextBlock",
                            "text": "${{ steps.status.outputs.emoji }} Ciyex EHR UI Production Deployment ${{ steps.status.outputs.status }}",
                            "weight": "Bolder",
                            "size": "Large"
                          },
                          {
                            "type": "TextBlock",
                            "text": "Release ${{ steps.version.outputs.version }} - Version ${{ env.VERSION }}",
                            "wrap": true
                          }
                        ]
                      },
                      {
                        "type": "FactSet",
                        "facts": [
                          {
                            "title": "Environment:",
                            "value": "Production"
                          },
                          {
                            "title": "Release:",
                            "value": "${{ steps.version.outputs.version }}"
                          },
                          {
                            "title": "Version:",
                            "value": "${{ env.VERSION }}"
                          },
                          {
                            "title": "Image:",
                            "value": "${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
                          },
                          {
                            "title": "Cluster:",
                            "value": "${{ env.CLUSTER_NAME }}"
                          },
                          {
                            "title": "Deployed by:",
                            "value": "${{ github.actor }}"
                          },
                          {
                            "title": "Commit:",
                            "value": "${{ github.sha }}"
                          },
                          {
                            "title": "URL:",
                            "value": "https://app.ciyex.com"
                          }
                        ]
                      }
                    ],
                    "actions": [
                      {
                        "type": "Action.OpenUrl",
                        "title": "View Workflow",
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      },
                      {
                        "type": "Action.OpenUrl",
                        "title": "View Application",
                        "url": "https://app.ciyex.com"
                      }
                    ]
                  }
                }
              ]
            }' "$TEAMS_WEBHOOK"
          else
            # Traditional Teams Incoming Webhook format (MessageCard)
            curl -H "Content-Type: application/json" -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "themeColor": "'"$STATUS_COLOR"'",
              "summary": "Production Deployment ${{ steps.status.outputs.status }}",
              "sections": [{
                "activityTitle": "${{ steps.status.outputs.emoji }} Ciyex EHR UI Production Deployment ${{ steps.status.outputs.status }}",
                "activitySubtitle": "Release ${{ steps.version.outputs.version }} - Version ${{ env.VERSION }}",
                "facts": [
                  {
                    "name": "Environment:",
                    "value": "Production"
                  },
                  {
                    "name": "Release:",
                    "value": "${{ steps.version.outputs.version }}"
                  },
                  {
                    "name": "Version:",
                    "value": "${{ env.VERSION }}"
                  },
                  {
                    "name": "Image:",
                    "value": "${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
                  },
                  {
                    "name": "Cluster:",
                    "value": "${{ env.CLUSTER_NAME }}"
                  },
                  {
                    "name": "Deployed by:",
                    "value": "${{ github.actor }}"
                  },
                  {
                    "name": "Commit:",
                    "value": "${{ github.sha }}"
                  },
                  {
                    "name": "URL:",
                    "value": "https://app.ciyex.com"
                  }
                ],
                "markdown": true
              }],
              "potentialAction": [{
                "@type": "OpenUri",
                "name": "View Workflow",
                "targets": [{
                  "os": "default",
                  "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }]
              },
              {
                "@type": "OpenUri",
                "name": "View Application",
                "targets": [{
                  "os": "default",
                  "uri": "https://app.ciyex.com"
                }]
              }]
            }' "$TEAMS_WEBHOOK"
          fi
