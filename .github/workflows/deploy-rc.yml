name: Deploy to RC

on:
  push:
    branches:
      - rc
  pull_request:
    branches:
      - rc
  workflow_dispatch:

env:
  ACR_NAME: hinikubestageacr.azurecr.io
  IMAGE_NAME: ciyex-ehr-ui-rc
  CLUSTER_NAME: hiniKubeStage
  RESOURCE_GROUP: hiniKubeStage-rg
  VERSION: v1.0.${{ github.run_number }}

jobs:
  pr-checks:
    name: PR Checks - Validate Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run type check
        run: pnpm run build

      - name: Run tests (if available)
        run: |
          if grep -q '"test"' package.json; then
            pnpm run test
          else
            echo "No tests configured, skipping..."
          fi

      - name: Build Docker image (no push)
        run: |
          docker build -t ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .
          echo "✅ PR image build successful: ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"

  deploy-rc:
    name: Deploy to RC
    if: github.ref == 'refs/heads/rc' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: rc
      url: https://stg.ciyex.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGE }}

      - name: Azure ACR Login
        run: az acr login --name hinikubestageacr

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .
          docker push ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          echo "✅ Image pushed: ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Update manifest image tags for deployment
        run: |
          sed -i "s|newName: IMAGE_URL|newName: ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}|g" k8s/overlays/rc/kustomization.yaml
          sed -i "s|newTag: IMAGE_TAG|newTag: ${{ env.VERSION }}|g" k8s/overlays/rc/kustomization.yaml
          echo "Updated kustomization.yaml:"
          cat k8s/overlays/rc/kustomization.yaml

      - name: Deploy to RC
        run: kubectl apply -k k8s/overlays/rc/

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/ciyex-ehr-ui-rc --timeout=3m
          kubectl get pods -l app=ciyex-ehr-ui -o wide

      - name: Notify deployment
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ RC deployment successful"
          else
            echo "❌ RC deployment failed"
          fi

  notify:
    name: Notify Team
    if: github.event_name != 'pull_request' && always()
    runs-on: ubuntu-latest
    needs: [deploy-rc]

    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.deploy-rc.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Microsoft Teams notification
        run: |
          TEAMS_WEBHOOK="${{ secrets.TEAMS_WEBHOOK_URL }}"
          if [ -z "$TEAMS_WEBHOOK" ]; then
            echo "⚠️ TEAMS_WEBHOOK_URL secret not configured, skipping notification"
            exit 0
          fi

          STATUS_COLOR="28a745"
          if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
            STATUS_COLOR="dc3545"
          fi

          if [[ "$TEAMS_WEBHOOK" == *"powerautomate"* ]] || [[ "$TEAMS_WEBHOOK" == *"logic.azure.com"* ]]; then
            CARD_STYLE="good"
            if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
              CARD_STYLE="attention"
            fi

            curl -X POST -H "Content-Type: application/json" -d '{
              "attachments": [
                {
                  "contentType": "application/vnd.microsoft.card.adaptive",
                  "content": {
                    "type": "AdaptiveCard",
                    "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                    "version": "1.4",
                    "body": [
                      {
                        "type": "Container",
                        "style": "'"$CARD_STYLE"'",
                        "items": [
                          {
                            "type": "TextBlock",
                            "text": "${{ steps.status.outputs.emoji }} Ciyex EHR UI RC Deployment ${{ steps.status.outputs.status }}",
                            "weight": "Bolder",
                            "size": "Large"
                          },
                          {
                            "type": "TextBlock",
                            "text": "Version ${{ env.VERSION }}",
                            "wrap": true
                          }
                        ]
                      },
                      {
                        "type": "FactSet",
                        "facts": [
                          {
                            "title": "Environment:",
                            "value": "RC"
                          },
                          {
                            "title": "Version:",
                            "value": "${{ env.VERSION }}"
                          },
                          {
                            "title": "Image:",
                            "value": "${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
                          },
                          {
                            "title": "Cluster:",
                            "value": "${{ env.CLUSTER_NAME }}"
                          },
                          {
                            "title": "Deployed by:",
                            "value": "${{ github.actor }}"
                          },
                          {
                            "title": "Commit:",
                            "value": "${{ github.sha }}"
                          },
                          {
                            "title": "URL:",
                            "value": "https://stg.ciyex.com"
                          }
                        ]
                      }
                    ],
                    "actions": [
                      {
                        "type": "Action.OpenUrl",
                        "title": "View Workflow",
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      },
                      {
                        "type": "Action.OpenUrl",
                        "title": "View Application",
                        "url": "https://stg.ciyex.com"
                      }
                    ]
                  }
                }
              ]
            }' "$TEAMS_WEBHOOK"
          else
            curl -H "Content-Type: application/json" -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "themeColor": "'"$STATUS_COLOR"'",
              "summary": "RC Deployment ${{ steps.status.outputs.status }}",
              "sections": [{
                "activityTitle": "${{ steps.status.outputs.emoji }} Ciyex EHR UI RC Deployment ${{ steps.status.outputs.status }}",
                "activitySubtitle": "Version ${{ env.VERSION }}",
                "facts": [
                  {
                    "name": "Environment:",
                    "value": "RC"
                  },
                  {
                    "name": "Version:",
                    "value": "${{ env.VERSION }}"
                  },
                  {
                    "name": "Image:",
                    "value": "${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
                  },
                  {
                    "name": "Cluster:",
                    "value": "${{ env.CLUSTER_NAME }}"
                  },
                  {
                    "name": "Deployed by:",
                    "value": "${{ github.actor }}"
                  },
                  {
                    "name": "Commit:",
                    "value": "${{ github.sha }}"
                  },
                  {
                    "name": "URL:",
                    "value": "https://stg.ciyex.com"
                  }
                ],
                "markdown": true
              }],
              "potentialAction": [{
                "@type": "OpenUri",
                "name": "View Workflow",
                "targets": [{
                  "os": "default",
                  "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }]
              },
              {
                "@type": "OpenUri",
                "name": "View Application",
                "targets": [{
                  "os": "default",
                  "uri": "https://stg.ciyex.com"
                }]
              }]
            }' "$TEAMS_WEBHOOK"
          fi
