apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ciyex-ehr-ui-ingress
spec:
  tls:
    - hosts:
        - stg.ciyex.com
      secretName: ciyex-ehr-ui-stage-tls
  rules:
    - host: stg.ciyex.com
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ciyex-ehr-ui-stage
                port:
                  number: 3000
